<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#fbbf24" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BibleAI" />
    <link rel="apple-touch-icon" href="/favicon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Default SEO (overridden by SeoMeta component at runtime) -->
    <title>BibleAI — AI-Powered Scripture & Prayer</title>
    <meta name="description" content="Chat with the Bible, track your prayers, and grow your faith with AI-powered insights. Join thousands of believers." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BibleAI — AI-Powered Scripture & Prayer" />
    <meta property="og:description" content="Chat with the Bible, track your prayers, and grow your faith with AI-powered insights." />
    <meta property="og:url" content="https://bible-ai-initial-build.vercel.app/" />
    <meta property="og:image" content="https://bible-ai-initial-build.vercel.app/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="BibleAI" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BibleAI — AI-Powered Scripture & Prayer" />
    <meta name="twitter:description" content="Chat with the Bible, track your prayers, and grow your faith with AI." />
    <meta name="twitter:image" content="https://bible-ai-initial-build.vercel.app/og-default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((reg) => console.log('[SW] Registered:', reg.scope))
            .catch((err) => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
